<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin - El Portón Azul</title>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
	<style>
		* { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
		body { margin: 0; background: #f4f7fc; display: flex; height: 100vh; }
		.sidebar { width: 240px; background: #0A2E5C; color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
		.sidebar h2 { color: #FFFFFF; margin-bottom: 30px; text-align: center; font-size: 20px; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; }
		.sidebar a { color: #b0c4de; text-decoration: none; padding: 12px 15px; border-radius: 8px; margin: 5px 0; transition: 0.3s; display: flex; align-items: center; font-weight: 500; }
		.sidebar a:hover, .sidebar a.active { background: #1A4A7A; color: #FFFFFF; border-left: 4px solid #D4AF37; }
		.main { flex: 1; padding: 20px; overflow-y: auto; }
		.header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(10, 46, 92, 0.08); margin-bottom: 20px; border-bottom: 3px solid #D4AF37; }
		.header h3 { margin: 0; color: #0A2E5C; }
		.btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
		.btn-danger { background: #D4AF37; color: #0A2E5C; }
		.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
		.stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(10, 46, 92, 0.08); text-align: center; transition: transform 0.2s; }
		.stat-card:hover { transform: translateY(-5px); }
		.stat-card h4 { color: #7f8c8d; margin: 0 0 10px 0; font-weight: 400; }
		.stat-card p { font-size: 28px; font-weight: 700; margin: 0; color: #0A2E5C; }
		.card-blue { border-top: 4px solid #0A2E5C; }
		.card-gold { border-top: 4px solid #D4AF37; }
		.card-green { border-top: 4px solid #00b894; }
	</style>
</head>
<body>
	<div class="sidebar">
		<h2>⚓ EL PORTÓN AZUL</h2>
		<a href="dashboard.html" class="active">📊 Dashboard</a>
		<a href="pedidos.html">📦 Pedidos</a>
		<a href="productos.html">🍤 Productos</a>
		<div style="flex:1;"></div>
		<a href="#" onclick="logout()" style="color: #e74c3c;">🚪 Salir</a>
	</div>

	<div class="main">
		<div class="header">
			<h3>Resumen de la Flota</h3>
			<button class="btn btn-danger" onclick="logout()">Cerrar Sesión</button>
		</div>
		<div class="stats-grid">
			<div class="stat-card card-blue">
				<h4>Pedidos Totales</h4>
				<p id="totalPedidos">0</p>
			</div>
			<div class="stat-card card-gold">
				<h4>Pedidos Hoy</h4>
				<p id="totalHoy">0</p>
			</div>
			<div class="stat-card card-blue">
				<h4>Pendientes</h4>
				<p id="totalPendientes">0</p>
			</div>
			<div class="stat-card card-green">
				<h4>Ingresos Hoy</h4>
				<p id="ingresosHoy">S/ 0.00</p>
			</div>
		</div>
	</div>

	<script>
		function logout() { localStorage.clear(); window.location.href = '../login.html'; }
        
		async function loadStats() {
			try {
				const res = await fetch('/api/pedidos');
				if (!res.ok) throw new Error('Error al obtener pedidos');
				const pedidos = await res.json();
                
				if (pedidos.length === 0) {
					document.getElementById('totalPedidos').textContent = "0";
					document.getElementById('totalHoy').textContent = "0";
					document.getElementById('totalPendientes').textContent = "0";
					document.getElementById('ingresosHoy').textContent = "S/ 0.00";
					return;
				}

				const hoy = new Date().toISOString().split('T')[0];
				const pedidosHoy = pedidos.filter(p => p.fecha_pedido && p.fecha_pedido.startsWith(hoy));
				const pendientes = pedidos.filter(p => p.nombre_estado === 'Pendiente');
				const ingresosHoy = pedidosHoy.reduce((acc, p) => acc + parseFloat(p.total || 0), 0);

				document.getElementById('totalPedidos').textContent = pedidos.length;
				document.getElementById('totalHoy').textContent = pedidosHoy.length;
				document.getElementById('totalPendientes').textContent = pendientes.length;
				document.getElementById('ingresosHoy').textContent = `S/ ${ingresosHoy.toFixed(2)}`;
                
			} catch (error) {
				console.error("❌ Error:", error);
			}
		}
		loadStats();
		setInterval(loadStats, 10000);
	</script>
</body>
</html>
