<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - El Portón Azul</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { margin: 0; background: #f4f7fc; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: #0A2E5C; color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { color: #FFFFFF; margin-bottom: 30px; text-align: center; font-size: 20px; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; }
        .sidebar a { color: #b0c4de; text-decoration: none; padding: 12px 15px; border-radius: 8px; margin: 5px 0; transition: 0.3s; display: flex; align-items: center; font-weight: 500; }
        .sidebar a:hover, .sidebar a.active { background: #1A4A7A; color: #FFFFFF; border-left: 4px solid #D4AF37; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(10, 46, 92, 0.08); margin-bottom: 20px; border-bottom: 3px solid #D4AF37; }
        .header h3 { margin: 0; color: #0A2E5C; }
        .content-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(10, 46, 92, 0.08); }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-gold { background: #D4AF37; color: #0A2E5C; }
        .btn-gold:hover { background: #c4a031; }
        .btn-primary { background: #0A2E5C; color: white; }
        .btn-primary:hover { background: #1A4A7A; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eef2f7; }
        th { background: #f8faff; font-weight: 600; color: #0A2E5C; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 46, 92, 0.6); justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 400px; max-width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 5px solid #D4AF37; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .modal-header h3 { margin: 0; color: #0A2E5C; }
        .close { cursor: pointer; font-size: 24px; color: #bdc3c7; }
        .close:hover { color: #e74c3c; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #dce3ed; border-radius: 8px; background: #fafbfc; }
        .btn-block { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>⚓ EL PORTÓN AZUL</h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="pedidos.html">📦 Pedidos</a>
        <a href="productos.html" class="active">🍤 Productos</a>
        <div style="flex:1;"></div>
        <a href="#" onclick="logout()" style="color: #e74c3c;">🚪 Salir</a>
    </div>

    <div class="main">
        <div class="header">
            <h3>Gestión de Productos</h3>
            <button class="btn btn-primary" onclick="openCreateModal()">+ Nuevo Producto</button>
        </div>
        <div class="content-card">
            <table id="productosTable">
                <thead><tr><th>ID</th><th>Producto</th><th>Precio</th><th>Acciones</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="modalTitle">Crear Producto</h3><span class="close" onclick="closeModal()">&times;</span></div>
            <input type="hidden" id="editId">
            <input type="text" id="nombre" placeholder="Nombre del producto" required>
            <textarea id="descripcion" placeholder="Descripción" rows="3"></textarea>
            <input type="number" id="precio" placeholder="Precio (S/)" step="0.01" required>
            <input type="text" id="imagen" placeholder="URL de la imagen (Ej: foto de pescado)">
            <button class="btn-block btn-gold" onclick="saveProduct()">Guardar Producto</button>
        </div>
    </div>

    <script>
        function logout() { localStorage.clear(); window.location.href = '../login.html'; }

        async function loadProducts() {
            const res = await fetch('/api/productos');
            const productos = await res.json();
            const tbody = document.querySelector('#productosTable tbody');
            tbody.innerHTML = '';
            productos.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${p.id_producto}</strong></td>
                    <td><strong>${p.nombre}</strong><br><small style="color:#7f8c8d;">${p.descripcion || ''}</small></td>
                    <td><strong style="color:#D4AF37;">S/ ${parseFloat(p.precio).toFixed(2)}</strong></td>
                    <td>
                        <button class="btn btn-primary" onclick="openEditModal(${p.id_producto})">Editar</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id_producto})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Crear Producto';
            document.getElementById('editId').value = '';
            document.getElementById('nombre').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('imagen').value = '';
            document.getElementById('productModal').style.display = 'flex';
        }

        async function openEditModal(id) {
            const res = await fetch(`/api/productos/${id}`);
            const p = await res.json();
            document.getElementById('modalTitle').textContent = 'Editar Producto';
            document.getElementById('editId').value = p.id_producto;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('descripcion').value = p.descripcion || '';
            document.getElementById('precio').value = p.precio;
            document.getElementById('imagen').value = p.imagen || '';
            document.getElementById('productModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        async function saveProduct() {
            const id = document.getElementById('editId').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(document.getElementById('precio').value),
                imagen: document.getElementById('imagen').value
            };
            const url = id ? `/api/productos/${id}` : '/api/productos';
            const method = id ? 'PUT' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            closeModal(); loadProducts();
        }

        async function deleteProduct(id) {
            if(confirm('¿Eliminar este producto?')) {
                await fetch(`/api/productos/${id}`, { method: 'DELETE' });
                loadProducts();
            }
        }

        loadProducts();
        window.onclick = function(event) { if (event.target.className === 'modal') event.target.style.display = 'none'; }
    </script>
</body>
</html>
