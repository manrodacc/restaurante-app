<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - El Portón Azul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #eef2f7; min-height: 100vh; }

        /* ── Header ── */
        .header {
            background: #0A2E5C; color: #fff;
            padding: 16px 32px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,.15);
            position: sticky; top: 0; z-index: 50;
        }
        .header h2 { color: #D4AF37; letter-spacing: 2px; font-size: 22px; }
        .header-actions { display: flex; gap: 10px; }
        .header-actions button {
            background: transparent; border: 2px solid #D4AF37;
            color: #D4AF37; padding: 7px 18px; border-radius: 22px;
            cursor: pointer; font-weight: 600; font-size: 14px;
            transition: .25s;
        }
        .header-actions button:hover { background: #D4AF37; color: #0A2E5C; }

        /* ── Layout ── */
        .layout { display: flex; min-height: calc(100vh - 58px); }

        /* ── Product Grid ── */
        .products {
            flex: 1; padding: 28px; overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px; align-content: start;
        }

        /* ── Card ── */
        .card {
            background: #fff; border-radius: 14px;
            box-shadow: 0 4px 16px rgba(10,46,92,.08);
            transition: transform .3s, box-shadow .3s;
            /* NO overflow:hidden aquí — esa era la causa del bug */
        }
        .card:hover { transform: translateY(-6px); box-shadow: 0 12px 28px rgba(10,46,92,.14); }

        .card img {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: 14px 14px 0 0;
            display: block;
            border-bottom: 3px solid #D4AF37;
        }

        .card-body { padding: 16px; }

        .card-body .nombre {
            font-size: 16px; font-weight: 700; color: #0A2E5C;
            margin-bottom: 4px; line-height: 1.3;
        }

        .card-body .descripcion {
            font-size: 13px; color: #64748b;
            margin-bottom: 10px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .card-body .precio {
            font-size: 20px; font-weight: 800; color: #D4AF37;
            margin-bottom: 12px;
        }

        .card-body .btn-agregar {
            width: 100%; padding: 11px; border: none;
            border-radius: 10px; background: #0A2E5C; color: #fff;
            font-weight: 700; font-size: 15px; cursor: pointer;
            transition: background .25s;
        }
        .card-body .btn-agregar:hover { background: #1A4A7A; }

        /* ── Cart Sidebar ── */
        .cart {
            width: 370px; min-width: 370px; background: #fff;
            border-left: 4px solid #D4AF37;
            display: flex; flex-direction: column;
            padding: 24px; overflow-y: auto;
        }
        .cart h3 { font-size: 20px; color: #0A2E5C; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #eef2f7; }

        .cart-items { flex: 1; }
        .cart-empty { text-align: center; color: #94a3b8; padding: 40px 0; font-size: 14px; }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #f1f5f9;
        }
        .cart-item-left { display: flex; flex-direction: column; gap: 2px; }
        .cart-item-left .ci-name { font-weight: 600; color: #1e293b; font-size: 14px; }
        .cart-item-left .ci-qty  { font-size: 12px; color: #94a3b8; }
        .cart-item-right { display: flex; align-items: center; gap: 10px; font-weight: 700; color: #0A2E5C; font-size: 14px; }
        .cart-item-right .ci-del {
            background: none; border: none; color: #cbd5e1; cursor: pointer;
            font-size: 15px; padding: 4px; border-radius: 50%; transition: .2s;
        }
        .cart-item-right .ci-del:hover { color: #ef4444; background: #fee2e2; }

        .cart-total {
            margin-top: 16px; padding-top: 14px;
            border-top: 2px dashed #cbd5e1;
            display: flex; justify-content: space-between; align-items: center;
        }
        .cart-total span:first-child { color: #64748b; font-size: 16px; }
        .cart-total span:last-child  { font-size: 22px; font-weight: 800; color: #0A2E5C; }

        .checkout { margin-top: auto; padding-top: 20px; }
        .checkout input, .checkout select {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0;
            border-radius: 10px; font-size: 14px; margin-bottom: 10px;
            outline: none; background: #f8fafc; color: #1e293b;
        }
        .checkout input:focus, .checkout select:focus { border-color: #0A2E5C; background: #fff; }

        .btn-confirmar {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: #D4AF37; color: #0A2E5C; font-weight: 800;
            font-size: 16px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; transition: .25s;
            box-shadow: 0 4px 14px rgba(212,175,55,.3);
        }
        .btn-confirmar:hover { background: #EBC85B; }
        .btn-confirmar:disabled { opacity: .6; cursor: not-allowed; }

        /* ── Toast ── */
        #toasts {
            position: fixed; bottom: 24px; right: 24px;
            display: flex; flex-direction: column; gap: 8px; z-index: 999;
        }
        .toast-msg {
            background: #fff; padding: 14px 22px; border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,.12);
            font-weight: 500; font-size: 14px; border-left: 5px solid #10b981;
            animation: slideInR .35s ease;
        }
        .toast-msg.err { border-left-color: #ef4444; }
        @keyframes slideInR { from { opacity:0; transform:translateX(80px); } to { opacity:1; transform:translateX(0); } }

        /* ── Loader ── */
        .loader { grid-column: 1/-1; text-align: center; padding: 60px; color: #0A2E5C; }
        .loader .spin {
            width: 36px; height: 36px; border: 4px solid rgba(10,46,92,.1);
            border-left-color: #0A2E5C; border-radius: 50%;
            animation: sp .8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes sp { to { transform: rotate(360deg); } }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .layout { flex-direction: column; }
            .cart { width: 100%; min-width: 100%; border-left: none; border-top: 4px solid #D4AF37; }
        }
    </style>
</head>
<body>

<div class="header">
    <h2>⚓ EL PORTÓN AZUL</h2>
    <div class="header-actions">
        <button onclick="location.href='seguimiento.html'">📍 Mis Pedidos</button>
        <button onclick="localStorage.clear();location.href='../login.html'">Salir</button>
    </div>
</div>

<div class="layout">
    <!-- Productos -->
    <div class="products" id="grid"></div>

    <!-- Carrito -->
    <div class="cart">
        <h3>🛒 Mi Pedido</h3>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">🛍️ Tu carrito está vacío</div>
        </div>
        <div class="cart-total">
            <span>Total:</span>
            <span>S/ <span id="cartTotal">0.00</span></span>
        </div>
        <div class="checkout">
            <input type="text" id="direccion" placeholder="📍 Dirección de entrega">
            <select id="metodoPago">
                <option value="Efectivo">💵 Efectivo</option>
                <option value="Tarjeta">💳 Tarjeta</option>
                <option value="Yape">📱 Yape / Plin</option>
            </select>
            <button class="btn-confirmar" id="btnConfirmar">Confirmar Pedido</button>
        </div>
    </div>
</div>

<div id="toasts"></div>

<script>
// ── Estado ──
var cart = [];
var productos = {};
var user = null;
try { user = JSON.parse(localStorage.getItem('user')); } catch(e){}
if (!user) { location.href = '../login.html'; }

// ── Toast ──
function toast(msg, err) {
    var d = document.createElement('div');
    d.className = 'toast-msg' + (err ? ' err' : '');
    d.textContent = msg;
    document.getElementById('toasts').appendChild(d);
    setTimeout(function(){ d.remove(); }, 3000);
}

// ── Imágenes por defecto ──
var defImgs = [
    'https://images.unsplash.com/photo-1534080564583-6be75777b70a?w=400&q=80',
    'https://images.unsplash.com/photo-1559742811-822873691df8?w=400&q=80',
    'https://images.unsplash.com/photo-1599974579688-18e114b83b66?w=400&q=80',
    'https://images.unsplash.com/photo-1626200926733-4eb00f40fb17?w=400&q=80',
    'https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=400&q=80'
];

// ── Cargar Productos ──
function loadProducts() {
    var grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loader"><div class="spin"></div><p>Cargando menú...</p></div>';

    fetch('/api/productos').then(function(res) {
        if (!res.ok) throw new Error('Error ' + res.status);
        return res.json();
    }).then(function(list) {
        grid.innerHTML = '';
        if (!list || !list.length) {
            grid.innerHTML = '<div class="loader" style="color:#94a3b8">🍽️ El menú se está actualizando.</div>';
            return;
        }

        for (var i = 0; i < list.length; i++) {
            var p = list[i];
            var id   = String(p.id_producto || p.id || i);
            var nom  = p.nombre || 'Sin nombre';
            var desc = p.descripcion || '';
            var pre  = parseFloat(p.precio || 0);
            var img  = p.imagen || '';
            var defImg = defImgs[i % defImgs.length];

            // Guardar para el carrito
            productos[id] = { id: id, nombre: nom, precio: pre };

            // Decidir imagen
            var imgSrc = (img && img !== 'null' && img.length > 5) ? img : defImg;

            // Crear tarjeta con HTML simple y directo
            var card = document.createElement('div');
            card.className = 'card';

            // Imagen
            var imgEl = document.createElement('img');
            imgEl.src = imgSrc;
            imgEl.alt = nom;
            imgEl.onerror = (function(fallback) {
                return function() { this.onerror = null; this.src = fallback; };
            })(defImg);

            // Cuerpo
            var body = document.createElement('div');
            body.className = 'card-body';

            var h4 = document.createElement('div');
            h4.className = 'nombre';
            h4.textContent = nom;

            var descEl = document.createElement('div');
            descEl.className = 'descripcion';
            descEl.textContent = desc;

            var preEl = document.createElement('div');
            preEl.className = 'precio';
            preEl.textContent = 'S/ ' + pre.toFixed(2);

            var btn = document.createElement('button');
            btn.className = 'btn-agregar';
            btn.textContent = '➕ Agregar';
            btn.setAttribute('data-id', id);
            btn.onclick = (function(pid, pnom) {
                return function() {
                    addToCart(pid);
                    toast('Se agregó ' + pnom);
                };
            })(id, nom);

            body.appendChild(h4);
            if (desc) body.appendChild(descEl);
            body.appendChild(preEl);
            body.appendChild(btn);

            card.appendChild(imgEl);
            card.appendChild(body);
            grid.appendChild(card);
        }
    }).catch(function(err) {
        console.error(err);
        grid.innerHTML = '<div class="loader" style="color:#ef4444">⚠️ Error: ' + err.message + '<br><button onclick="loadProducts()" class="btn-confirmar" style="width:auto;padding:10px 20px;margin-top:16px">Reintentar</button></div>';
    });
}

// ── Carrito ──
function addToCart(id) {
    var p = productos[id];
    if (!p) return;
    var found = null;
    for (var i = 0; i < cart.length; i++) {
        if (cart[i].id === id) { found = cart[i]; break; }
    }
    if (found) { found.cantidad++; }
    else { cart.push({ id: p.id, id_producto: p.id, nombre: p.nombre, precio: p.precio, cantidad: 1 }); }
    renderCart();
}

function removeFromCart(idx) {
    var item = cart[idx];
    cart.splice(idx, 1);
    toast('Se eliminó ' + item.nombre, true);
    renderCart();
}

function renderCart() {
    var c = document.getElementById('cartItems');
    c.innerHTML = '';
    if (cart.length === 0) {
        c.innerHTML = '<div class="cart-empty">🛍️ Tu carrito está vacío</div>';
        document.getElementById('cartTotal').textContent = '0.00';
        return;
    }
    var total = 0;
    for (var i = 0; i < cart.length; i++) {
        var item = cart[i];
        var sub = item.precio * item.cantidad;
        total += sub;

        var row = document.createElement('div');
        row.className = 'cart-item';

        var left = document.createElement('div');
        left.className = 'cart-item-left';
        var n = document.createElement('span');
        n.className = 'ci-name';
        n.textContent = item.nombre;
        var q = document.createElement('span');
        q.className = 'ci-qty';
        q.textContent = 'x' + item.cantidad;
        left.appendChild(n);
        left.appendChild(q);

        var right = document.createElement('div');
        right.className = 'cart-item-right';
        right.textContent = 'S/ ' + sub.toFixed(2) + ' ';
        var del = document.createElement('button');
        del.className = 'ci-del';
        del.textContent = '✖';
        del.onclick = (function(idx) { return function() { removeFromCart(idx); }; })(i);
        right.appendChild(del);

        row.appendChild(left);
        row.appendChild(right);
        c.appendChild(row);
    }
    document.getElementById('cartTotal').textContent = total.toFixed(2);
}

// ── Confirmar Pedido ──
document.getElementById('btnConfirmar').onclick = function() {
    if (cart.length === 0) { toast('El carrito está vacío', true); return; }
    var dir = document.getElementById('direccion').value.trim();
    if (!dir) { toast('Ingresa una dirección', true); document.getElementById('direccion').focus(); return; }
    var mp = document.getElementById('metodoPago').value;
    var total = parseFloat(document.getElementById('cartTotal').textContent);
    var btn = document.getElementById('btnConfirmar');
    btn.disabled = true;
    btn.textContent = 'Procesando...';

    fetch('/api/pedidos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            id_usuario: user.id_usuario || user.id,
            direccion: dir, metodo_pago: mp, total: total, items: cart
        })
    }).then(function(res) {
        if (!res.ok) return res.json().then(function(d){ throw new Error(d.error || 'Error'); });
        toast('¡Pedido realizado con éxito! 🛵');
        cart = []; renderCart();
        setTimeout(function(){ location.href = 'seguimiento.html'; }, 1500);
    }).catch(function(err) {
        toast(err.message, true);
    }).finally(function() {
        btn.disabled = false;
        btn.textContent = 'Confirmar Pedido';
    });
};

// ── Iniciar ──
loadProducts();
</script>
</body>
</html>
