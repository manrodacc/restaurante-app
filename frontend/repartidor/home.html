<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Panel Repartidor - El Portón Azul</title>
	<script>
		window.addEventListener('error', function(e) {
			var container = document.getElementById('pedidosAsignados');
			if (container) {
				container.innerHTML = '<div style="background:#fff0f0; border:2px solid #ffcccc; padding:20px; border-radius:12px; color:#d63031; text-align:center; font-family:sans-serif; margin-top:20px; border-top: 4px solid #d63031;">' +
					'<h3 style="margin-bottom:10px;">⚠️ Error de Ejecución (Frontend)</h3>' +
					'<p style="font-size:14px; margin-bottom:10px;">' + e.message + '</p>' +
					'<p style="font-size:12px; color:#7f8c8d;">Archivo: ' + e.filename + ' (Línea: ' + e.lineno + ')</p>' +
					'</div>';
			}
		});
	</script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
		body { background: #eef2f7; min-height: 100vh; }
		
		.header {
			background: #0A2E5C; color: #fff;
			padding: 16px 32px; display: flex;
			justify-content: space-between; align-items: center;
			box-shadow: 0 2px 12px rgba(0,0,0,.15);
			position: sticky; top: 0; z-index: 50;
		}
		.header h2 { color: #D4AF37; letter-spacing: 2px; font-size: 22px; }
		.btn-logout {
			background: #e74c3c; color: white; border: none;
			padding: 7px 18px; border-radius: 22px;
			cursor: pointer; font-weight: 600; font-size: 14px;
			transition: background .25s;
		}
		.btn-logout:hover { background: #c0392b; }
		
		.container { max-width: 950px; margin: 30px auto; padding: 0 20px; }
		
		.card {
			background: #fff; border-radius: 14px;
			box-shadow: 0 4px 16px rgba(10,46,92,.08);
			padding: 24px; margin-bottom: 24px;
		}
		
		.sim-card {
			background: #0A2E5C; color: white;
			border-left: 5px solid #D4AF37;
		}
		
		.btn {
			padding: 10px 20px; border: none; border-radius: 10px;
			cursor: pointer; font-weight: 700; font-size: 14px;
			transition: background .25s; text-decoration: none;
			display: inline-flex; align-items: center; justify-content: center; gap: 8px;
		}
		.btn-green { background: #00b894; color: white; }
		.btn-green:hover { background: #009475; }
		.btn-blue { background: #0984e3; color: white; }
		.btn-blue:hover { background: #076bba; }
		.btn-orange { background: #D4AF37; color: #0A2E5C; }
		.btn-orange:hover { background: #c4a031; }
		.btn-whatsapp { background: #25D366; color: white; }
		.btn-whatsapp:hover { background: #1ebd54; }

		select {
			padding: 10px; border-radius: 10px;
			border: 2px solid #cbd5e1; background: #fff;
			font-size: 14px; font-weight: 600; color: #2c3e50;
			outline: none; transition: border-color 0.25s;
		}
		select:focus { border-color: #0A2E5C; }
		
		.custom-div-icon {
			background: transparent;
			border: none;
		}

		.info-row {
			background: #f8fafc; padding: 15px;
			border-radius: 10px; border: 1px solid #e2e8f0;
			margin-bottom: 15px; font-size: 14px; color: #2c3e50;
			line-height: 1.6;
		}

		.actions-row {
			display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
			margin-top: 15px;
		}

		.error-message {
			background: #fff0f0;
			border: 1px solid #ffcccc;
			border-radius: 10px;
			color: #d63031;
			padding: 20px;
			text-align: center;
			font-weight: bold;
			margin-bottom: 20px;
		}
	</style>
</head>
<body>
	<div class="header">
		<h2>🚚 Panel Repartidor</h2>
		<button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
	</div>

	<div class="container">
		<div class="card sim-card">
			<h3 style="margin-bottom: 8px; color: #D4AF37;">📍 Sincronización de Ubicación</h3>
			<p style="margin-bottom: 15px; font-size: 14px; opacity: 0.9;">Presiona para simular tu movimiento en tiempo real dentro de la ciudad de Trujillo. Los clientes verán tu marcador moverse en vivo.</p>
			<button class="btn btn-orange" onclick="simularUbicacion()">📤 Actualizar mi Ubicación Simulada</button>
		</div>

		<div id="pedidosAsignados">
			<div class="card"><p style="text-align:center; color:#7f8c8d;">Cargando pedidos asignados...</p></div>
		</div>
	</div>

	<script>
		var user = null;
		try {
			user = JSON.parse(localStorage.getItem('user'));
		} catch(e) {
			console.error("Error al parsear el usuario", e);
		}

		if (!user) { window.location.href = '../login.html'; }

		// Ubicación actual del repartidor
		window.repartidorLat = user ? (parseFloat(user.lat) || -8.109) : -8.109;
		window.repartidorLng = user ? (parseFloat(user.lng) || -79.021) : -79.021;

		window.leafletMaps = window.leafletMaps || {};

		var houseIcon = L.divIcon({
			html: '<div style="font-size: 24px; background: white; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.25); border: 2.5px solid #00b894;">🏠</div>',
			className: 'custom-div-icon',
			iconSize: [42, 42],
			iconAnchor: [21, 21]
		});

		var motoIcon = L.divIcon({
			html: '<div style="font-size: 24px; background: white; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.25); border: 2.5px solid #6c5ce7;">🛵</div>',
			className: 'custom-div-icon',
			iconSize: [42, 42],
			iconAnchor: [21, 21]
		});

		function cargarPedidos() {
			var userId = user ? (user.id_usuario || user.id) : null;
			if (!userId) {
				var container = document.getElementById('pedidosAsignados');
				container.innerHTML = '<div class="card"><p style="text-align:center; color:#e74c3c;"><strong>⚠️ Error:</strong> Sesión de repartidor inválida. Por favor inicia sesión de nuevo.</p></div>';
				return;
			}

			fetch('/api/repartidor/pedidos/' + userId)
				.then(function(res) { 
					if (!res.ok) {
						return res.json().then(function(errData) {
							throw new Error(errData.error || 'Error del servidor (código ' + res.status + ')');
						}).catch(function() {
							throw new Error('Error de comunicación con el servidor (código ' + res.status + ')');
						});
					}
					return res.json(); 
				})
				.then(function(pedidos) {
					var container = document.getElementById('pedidosAsignados');
					
					if (!pedidos || pedidos.length === 0) {
						container.innerHTML = `<div class="card"><p style="text-align:center; color:#7f8c8d; font-size:18px; padding:40px 0;">🛵 No tienes pedidos activos asignados actualmente.</p></div>`;
						// Limpiar mapas
						for (var id in window.leafletMaps) {
							if (window.leafletMaps.hasOwnProperty(id)) {
								try { window.leafletMaps[id].map.remove(); } catch(e){}
							}
						}
						window.leafletMaps = {};
						return;
					}

					// Quitar cargador inicial o mensaje de error anterior
					var firstElement = container.firstElementChild;
					if (firstElement && (firstElement.innerHTML.indexOf('Cargando') !== -1 || firstElement.innerHTML.indexOf('Error') !== -1)) {
						container.innerHTML = '';
					}

					var activeIds = {};

					pedidos.forEach(function(p) {
						var id_pedido = p.id_pedido;
						activeIds[id_pedido] = true;
						
						// Parse de coordenadas súper robusto (evitando NaN)
						var clienteLat = (p.cliente_lat && !isNaN(parseFloat(p.cliente_lat))) ? parseFloat(p.cliente_lat) : -8.109;
						var clienteLng = (p.cliente_lng && !isNaN(parseFloat(p.cliente_lng))) ? parseFloat(p.cliente_lng) : -79.021;

						var card = document.getElementById('order_card_' + id_pedido);

						if (!card) {
							// Crear nueva tarjeta
							card = document.createElement('div');
							card.id = 'order_card_' + id_pedido;
							card.className = 'card';
							card.innerHTML = `
								<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
									<h3 style="margin:0; color:#0A2E5C; font-size:20px;">Pedido #${id_pedido} - ${p.cliente_nombre}</h3>
									<span id="badge_${id_pedido}" style="background:#00b894; color:white; padding:5px 12px; border-radius:20px; font-size:13px; font-weight:700;">${p.nombre_estado}</span>
								</div>
								
								<div class="info-row">
									<p><strong>📍 Dirección de Entrega:</strong> ${p.direccion}</p>
									<p><strong>💰 Total a Recibir/Cobrar:</strong> S/ ${parseFloat(p.total).toFixed(2)} (${p.metodo_pago})</p>
									<p><strong>📞 Teléfono Cliente:</strong> ${p.cliente_telefono || '<span style="color:#94a3b8;">No disponible</span>'}</p>
									
									<div style="display:flex; gap:10px; margin-top:12px;">
										${p.cliente_telefono ? `
											<a href="tel:${p.cliente_telefono}" class="btn btn-green">📞 Llamar Cliente</a>
											<a href="https://wa.me/51${p.cliente_telefono}?text=Hola%20${encodeURIComponent(p.cliente_nombre)},%20te%20escribe%20el%20repartidor%20de%20El%20Portón%20Azul%20en%20camino%20con%20tu%20pedido." target="_blank" class="btn btn-whatsapp">💬 WhatsApp</a>
										` : ''}
									</div>
								</div>

								<div id="mapContainer_${id_pedido}" style="height: 350px; width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid #cbd5e1; z-index: 1;"></div>
								
								<div class="actions-row">
									<strong style="color: #0A2E5C;">Actualizar Estado:</strong>
									<select id="estado_${id_pedido}">
										<option value="5" ${p.id_estado === 5 ? 'selected' : ''}>En camino</option>
										<option value="6" ${p.id_estado === 6 ? 'selected' : ''}>Llegó</option>
										<option value="7" ${p.id_estado === 7 ? 'selected' : ''}>Entregado</option>
									</select>
									<button class="btn btn-blue" onclick="actualizarEstado(${id_pedido})">Guardar Estado</button>
								</div>
							`;
							container.appendChild(card);

							// Inicializar mapa
							try {
								var map = L.map('mapContainer_' + id_pedido);
								L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
									attribution: '&copy; OpenStreetMap contributors'
								}).addTo(map);

								var clientMarker = L.marker([clienteLat, clienteLng], {icon: houseIcon})
									.addTo(map)
									.bindPopup("🏠 Cliente (Punto de entrega)");

								var riderMarker = L.marker([window.repartidorLat, window.repartidorLng], {icon: motoIcon})
									.addTo(map)
									.bindPopup("🛵 Mi ubicación");

								var polyline = L.polyline([[clienteLat, clienteLng], [window.repartidorLat, window.repartidorLng]], {
									color: '#6c5ce7',
									weight: 4,
									dashArray: '6, 12'
								}).addTo(map);

								map.fitBounds([[clienteLat, clienteLng], [window.repartidorLat, window.repartidorLng]], {padding: [50, 50]});

								window.leafletMaps[id_pedido] = {
									map: map,
									clientMarker: clientMarker,
									riderMarker: riderMarker,
									polyline: polyline
								};
							} catch(mapErr) {
								console.error('Error al inicializar el mapa Leaflet para el pedido asignado ' + id_pedido, mapErr);
							}
						} else {
							// Actualizar tarjeta existente
							var badge = document.getElementById('badge_' + id_pedido);
							badge.textContent = p.nombre_estado;

							// Actualizar Mapa Leaflet
							var mapObj = window.leafletMaps[id_pedido];
							if (mapObj) {
								try {
									mapObj.clientMarker.setLatLng([clienteLat, clienteLng]);
									mapObj.riderMarker.setLatLng([window.repartidorLat, window.repartidorLng]);
									mapObj.polyline.setLatLngs([[clienteLat, clienteLng], [window.repartidorLat, window.repartidorLng]]);
									mapObj.map.fitBounds([[clienteLat, clienteLng], [window.repartidorLat, window.repartidorLng]], {padding: [50, 50]});
								} catch(mapUpErr) {
									console.error('Error al actualizar el mapa para el pedido asignado ' + id_pedido, mapUpErr);
								}
							}
						}
					});

					// Limpiar tarjetas antiguas
					var cards = container.querySelectorAll('.card');
					cards.forEach(function(c) {
						var idMatch = c.id.match(/^order_card_(\d+)$/);
						if (idMatch) {
							var orderId = parseInt(idMatch[1]);
							if (!activeIds[orderId]) {
								c.remove();
								if (window.leafletMaps[orderId]) {
									try { window.leafletMaps[orderId].map.remove(); } catch(e){}
									delete window.leafletMaps[orderId];
								}
							}
						}
					});

				}).catch(function(err) {
					console.error('Error al cargar pedidos del repartidor:', err);
					var container = document.getElementById('pedidosAsignados');
					container.innerHTML = `<div class="error-message">⚠️ Error al cargar pedidos asignados: ${err.message}<br><button onclick="cargarPedidos()" class="btn btn-blue" style="margin-top: 15px;">🔄 Reintentar</button></div>`;
				});
		}

		function actualizarMapasRepartidor() {
			for (var id in window.leafletMaps) {
				if (window.leafletMaps.hasOwnProperty(id)) {
					var mapObj = window.leafletMaps[id];
					try {
						var clientLatLng = mapObj.clientMarker.getLatLng();
						mapObj.riderMarker.setLatLng([window.repartidorLat, window.repartidorLng]);
						mapObj.polyline.setLatLngs([clientLatLng, [window.repartidorLat, window.repartidorLng]]);
						mapObj.map.fitBounds([clientLatLng, [window.repartidorLat, window.repartidorLng]], {padding: [50, 50]});
					} catch(e) {
						console.error(e);
					}
				}
			}
		}

		function actualizarEstado(id_pedido) {
			var id_estado = document.getElementById('estado_' + id_pedido).value;
			fetch('/api/pedidos?id=' + id_pedido + '&action=estado', {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ id_estado: parseInt(id_estado) })
			}).then(function(res) {
				if (res.ok) {
					cargarPedidos();
				} else {
					alert('No se pudo actualizar el estado del pedido.');
				}
			}).catch(function(e) {
				console.error(e);
			});
		}

		function simularUbicacion() {
			// Simular un movimiento en Trujillo
			var lat = -8.109 + (Math.random() - 0.5) * 0.015;
			var lng = -79.021 + (Math.random() - 0.5) * 0.015;
            
			window.repartidorLat = lat;
			window.repartidorLng = lng;
            
			if (user) {
				user.lat = lat;
				user.lng = lng;
				localStorage.setItem('user', JSON.stringify(user));

				fetch('/api/users/location/' + (user.id_usuario || user.id), {
					method: 'PUT',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ lat: lat, lng: lng })
				}).then(function() {
					// Actualizar mapas localmente de inmediato para feedback instantáneo
					actualizarMapasRepartidor();
				}).catch(console.error);
			}
		}

		function logout() { localStorage.clear(); window.location.href = '../login.html'; }

		cargarPedidos();
		// Cargar cada 8 segundos para mantener un tracking dinámico
		setInterval(cargarPedidos, 8000);
	</script>
</body>
</html>
