<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Panel Repartidor</title>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		* { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
		body { margin: 0; background: #f4f4f4; }
		.header { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
		.header h2 { margin: 0; color: #fdcb6e; }
		.container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
		.card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; }
		.btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
		.btn-green { background: #00b894; color: white; }
		.btn-blue { background: #0984e3; color: white; }
		.btn-orange { background: #fdcb6e; color: #2d3436; }
		.btn-red { background: #e74c3c; color: white; }
		select { padding: 6px; border-radius: 6px; border: 1px solid #ddd; margin-right: 5px; }
		#mapContainer { height: 350px; width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid #ddd; z-index: 1; }
	</style>
</head>
<body>
	<div class="header">
		<h2>🚚 Panel Repartidor - Trujillo</h2>
		<button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:6px 15px; border-radius:20px; cursor:pointer;">Cerrar Sesión</button>
	</div>

	<div class="container">
		<div class="card" style="background:#6c5ce7; color:white;">
			<h4 style="margin:0;">📍 Actualizar mi ubicación</h4>
			<p style="margin:10px 0; font-size:14px; opacity:0.9;">Haz clic para enviar tu ubicación simulada en Trujillo al servidor</p>
			<button class="btn btn-orange" onclick="simularUbicacion()" style="font-weight:bold;">📤 Enviar ubicación simulada</button>
		</div>

		<div id="pedidosAsignados">
			<div class="card"><p style="text-align:center; color:#7f8c8d;">Cargando pedidos asignados...</p></div>
		</div>
	</div>

	<script>
		let user = JSON.parse(localStorage.getItem('user'));

		// Función para inicializar el mapa en el div que ya existe en el DOM
		function initMap(containerId, lat, lng) {
			const container = document.getElementById(containerId);
			if (!container) return; // Si el contenedor no existe, no hacer nada

			// Si el mapa ya está inicializado, solo actualizar vista
			if (container._leaflet_map) {
				if (lat && lng) {
					container._leaflet_map.setView([lat, lng], 14);
					if (container._leaflet_marker) {
						container._leaflet_map.removeLayer(container._leaflet_marker);
					}
					container._leaflet_marker = L.marker([lat, lng]).addTo(container._leaflet_map)
						.bindPopup("📍 Repartidor en camino").openPopup();
				}
				return;
			}

			// Crear el mapa por primera vez
			const centerLat = lat || -8.109;
			const centerLng = lng || -79.021;
			const map = L.map(containerId).setView([centerLat, centerLng], 14);
			L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
				attribution: '&copy; OpenStreetMap contributors'
			}).addTo(map);

			// Guardar referencia al mapa y al marcador en el contenedor
			container._leaflet_map = map;
			if (lat && lng) {
				container._leaflet_marker = L.marker([lat, lng]).addTo(map)
					.bindPopup("📍 Repartidor en camino").openPopup();
			} else {
				container._leaflet_marker = L.marker([-8.109, -79.021]).addTo(map)
					.bindPopup("📍 Zona céntrica de Trujillo").openPopup();
			}
		}

		async function cargarPedidos() {
			const res = await fetch(`/api/repartidor/pedidos/${user.id_usuario}`);
			const pedidos = await res.json();
			const container = document.getElementById('pedidosAsignados');
			container.innerHTML = '';
            
			if (pedidos.length === 0) {
				container.innerHTML = `<div class="card"><p style="text-align:center; color:#7f8c8d; font-size:18px; padding:40px 0;">🛵 No tienes pedidos activos asignados.</p></div>`;
				return;
			}
            
			pedidos.forEach(p => {
				const div = document.createElement('div');
				div.className = 'card';
				div.innerHTML = `
					<div style="display:flex; justify-content:space-between; align-items:center;">
						<h3 style="margin:0;">Pedido #${p.id_pedido} - ${p.cliente_nombre}</h3>
						<span style="background:#00b894; color:white; padding:3px 10px; border-radius:12px; font-size:13px;">${p.nombre_estado}</span>
					</div>
					<p><strong>Dirección:</strong> ${p.direccion}</p>
					<div id="mapContainer_${p.id_pedido}" style="height: 350px; width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid #ddd; z-index: 1;"></div>
					<hr style="border-color:#f4f4f4;">
					<div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
						<select id="estado_${p.id_pedido}">
							<option value="5">En camino</option>
							<option value="6">Llegó</option>
							<option value="7">Entregado</option>
						</select>
						<button class="btn btn-blue" onclick="actualizarEstado(${p.id_pedido})">Actualizar Estado</button>
					</div>
				`;
				container.appendChild(div);
                
				// Inicializar el mapa pasando el ID único del contenedor
				setTimeout(() => {
					initMap(`mapContainer_${p.id_pedido}`, -8.109, -79.021);
				}, 100);
			});
		}

		async function actualizarEstado(id_pedido) {
			const id_estado = document.getElementById(`estado_${id_pedido}`).value;
			await fetch(`/api/pedidos/${id_pedido}/estado`, {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ id_estado: parseInt(id_estado) })
			});
			cargarPedidos();
		}

		async function simularUbicacion() {
			const lat = -8.109 + (Math.random() - 0.5) * 0.02;
			const lng = -79.021 + (Math.random() - 0.5) * 0.02;
            
			await fetch(`/api/users/location/${user.id_usuario}`, {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ lat, lng })
			});
			alert('✅ Ubicación actualizada en el servidor (Trujillo)');
		}

		function logout() { localStorage.clear(); window.location.href = '../login.html'; }

		cargarPedidos();
		setInterval(cargarPedidos, 10000);
	</script>
</body>
</html>
