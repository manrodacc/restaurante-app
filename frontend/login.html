<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - El Portón Azul</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #f4f7fc; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(10, 46, 92, 0.1); width: 380px; text-align: center; border-top: 5px solid #D4AF37; }
        .logo { font-size: 28px; font-weight: 700; color: #0A2E5C; margin-bottom: 20px; }
        .logo span { color: #D4AF37; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dce3ed; border-radius: 8px; font-size: 14px; background: #fafbfc; }
        input:focus { border-color: #0A2E5C; outline: none; }
        button { width: 100%; padding: 12px; background: #0A2E5C; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
        button:hover { background: #1A4A7A; }
        .error { color: #e74c3c; font-size: 13px; margin-top: 10px; }
        a { display: block; margin-top: 15px; text-decoration: none; color: #D4AF37; font-weight: 500; }
        a:hover { color: #c4a031; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚓ <span>EL PORTÓN AZUL</span></div>
        <h2 style="color: #0A2E5C;">Bienvenido</h2>
        <form id="loginForm">
            <input type="email" id="correo" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">Acceder</button>
            <div id="errorMsg" class="error"></div>
        </form>
        <a href="register.html">Crear una cuenta</a>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                if (data.user.rol === 'admin') window.location.href = 'admin/dashboard.html';
                else if (data.user.rol === 'repartidor') window.location.href = 'repartidor/home.html';
                else window.location.href = 'cliente/home.html';
            } else {
                document.getElementById('errorMsg').textContent = data.error || 'Credenciales incorrectas';
            }
        });
    </script>
</body>
</html>
